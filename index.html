<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>心炮彈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans TC', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0f1a24, #050a0f);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .phone-frame {
            max-width: 480px;
            width: 100%;
            background: rgba(12, 22, 30, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.2px solid rgba(0, 210, 200, 0.25);
            border-radius: 52px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 210, 0.1) inset;
            padding: 24px 18px 28px;
            transition: all 0.2s;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 8px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .heart-beat-dot {
            width: 16px;
            height: 16px;
            background: #0ef7e0;
            border-radius: 50%;
            box-shadow: 0 0 18px #1affdd;
            animation: heartbeatPulse 1.3s infinite ease-in-out;
        }

        @keyframes heartbeatPulse {
            0%, 100% { opacity: 0.9; transform: scale(1); box-shadow: 0 0 10px #0ef7e0; }
            50% { opacity: 0.4; transform: scale(1.3); box-shadow: 0 0 22px #0ef7e0; }
        }

        h1 {
            font-weight: 550;
            font-size: 1.9rem;
            letter-spacing: 4px;
            color: #ecfdff;
            text-shadow: 0 3px 8px #00000060;
        }

        .device-tag {
            background: #173e4a;
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid #2ad4c0;
            color: #b2f0ea;
            font-weight: 500;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 10px #00808040;
        }

        .ecg-panel {
            background: #020b12;
            border-radius: 34px;
            padding: 14px 8px 6px;
            margin: 10px 0 16px;
            border: 1px solid #1f5b64;
            box-shadow: inset 0 5px 8px #00000080, 0 8px 12px #00000040;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: transparent;
            border-radius: 22px;
            touch-action: none;
        }

        .hr-monitor-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin: 6px 8px 10px;
        }

        .hr-left {
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .hr-label {
            color: #8fb1c4;
            font-weight: 400;
            font-size: 1.2rem;
        }

        .hr-number {
            font-size: 3.4rem;
            font-weight: 650;
            color: #f5ffff;
            line-height: 1;
            text-shadow: 0 0 16px #2ee6d0;
            letter-spacing: 2px;
        }

        .hr-unit {
            color: #6f9eb3;
            font-size: 1.2rem;
            margin-left: 4px;
        }

        .rhythm-badge {
            background: #0e2530;
            padding: 8px 22px;
            border-radius: 60px;
            border-left: 6px solid;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 10px #00000070;
        }

        .rhythm-name {
            font-size: 1.35rem;
            font-weight: 600;
            color: #def5ff;
        }

        .alert-bar {
            margin: 4px 8px 14px;
            min-height: 36px;
            font-size: 1.15rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #ffd1c2;
            text-shadow: 0 0 6px #ff5e3a;
        }

        .divider-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #1f7a80, #4edfdf, #1f7a80, transparent);
            margin: 14px 0 18px;
            opacity: 0.7;
        }

        .stress-training-card {
            background: #0e1b26d0;
            border-radius: 42px;
            padding: 18px 16px;
            backdrop-filter: blur(10px);
            border: 1px solid #2e8590;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .card-header span:first-child {
            color: #c5eaf5;
            font-weight: 550;
            font-size: 1.35rem;
        }

        .stress-level-badge {
            background: #153a46;
            border-radius: 40px;
            padding: 6px 18px;
            color: #b6f0fd;
            font-weight: 600;
            border: 1px solid #3fd0d0;
        }

        .slider-wrapper {
            margin: 10px 0 20px;
        }

        input[type=range] {
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #0e9c8a, #e0a93b, #d9534f);
            border-radius: 30px;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: #f0faff;
            border-radius: 30px;
            box-shadow: 0 0 22px #0fffd0, 0 2px 10px black;
            border: 2.5px solid #0fc5c5;
            cursor: grab;
        }

        .metric-grid {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            margin-top: 8px;
        }

        .metric-item {
            background: #03161f;
            border-radius: 30px;
            padding: 14px 4px;
            flex: 1;
            text-align: center;
            border: 1px solid #1f7a7a;
            box-shadow: inset 0 2px 6px #000000, 0 6px 8px #00000030;
        }

        .metric-title {
            color: #7eaec7;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 2.0rem;
            font-weight: 700;
            color: #e2fdff;
            text-shadow: 0 0 10px #1fb5d4;
        }

        .metric-unit {
            font-size: 0.9rem;
            color: #5f9db3;
            margin-left: 3px;
        }

        .button-group {
            display: flex;
            gap: 14px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            background: #143b4a;
            border: none;
            border-radius: 70px;
            padding: 16px 6px;
            font-size: 1.25rem;
            font-weight: 600;
            color: #e1f9ff;
            border-bottom: 4px solid #19a7a7;
            border-right: 1px solid #2dafc0;
            box-shadow: 0 7px 0 #08212b, 0 5px 12px black;
            cursor: pointer;
            transition: all 0.07s;
            text-align: center;
            backdrop-filter: blur(10px);
            letter-spacing: 2px;
            touch-action: manipulation;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #08212b, 0 4px 10px black;
            border-bottom-width: 2px;
        }

        .btn.reset-style {
            background: #173b47;
            border-bottom-color: #bd8b3a;
            border-right-color: #dbb267;
        }

        .footer-watermark {
            margin-top: 12px;
            text-align: right;
            color: #3c7b8f;
            font-size: 0.9rem;
            padding-right: 6px;
            font-weight: 400;
        }
    </style>
</head>
<body>
<div class="phone-frame">
    <div class="app-header">
        <div class="logo-area">
            <div class="heart-beat-dot"></div>
            <h1>心炮彈</h1>
        </div>
        <div class="device-tag">即時偵測</div>
    </div>

    <div class="ecg-panel">
        <canvas id="ecgCanvas" width="440" height="150"></canvas>
    </div>

    <div class="hr-monitor-row">
        <div class="hr-left">
            <span class="hr-label">心率</span>
            <span class="hr-number" id="hrDisplay">72</span>
            <span class="hr-unit">BPM</span>
        </div>
        <div class="rhythm-badge" id="rhythmTag">
            <span class="rhythm-name" id="rhythmLabel">竇性心律</span>
        </div>
    </div>

    <div class="alert-bar" id="alertBox">
        <span id="alertMessage">心律正常 無異常</span>
    </div>

    <div class="divider-line"></div>

    <div class="stress-training-card">
        <div class="card-header">
            <span>模擬心臟壓力訓練</span>
            <span class="stress-level-badge" id="pressureLevelDisplay">輕度負荷</span>
        </div>
        <div class="slider-wrapper">
            <input type="range" id="stressSlider" min="0" max="100" value="22" step="1">
        </div>
        <div class="metric-grid">
            <div class="metric-item">
                <div class="metric-title">負荷指數</div>
                <div class="metric-value"><span id="stressPercent">22</span><span class="metric-unit">%</span></div>
            </div>
            <div class="metric-item">
                <div class="metric-title">模擬 HRV</div>
                <div class="metric-value"><span id="hrvValue">48</span><span class="metric-unit">ms</span></div>
            </div>
            <div class="metric-item">
                <div class="metric-title">訓練強度</div>
                <div class="metric-value"><span id="intensityText">中低</span></div>
            </div>
        </div>
        <div class="button-group">
            <button class="btn reset-style" id="resetDefaultBtn">重置壓力</button>
        </div>
    </div>
    <div class="footer-watermark">心炮彈 · 壓力模擬器</div>
</div>

<script>
    (function(){
        "use strict";

        const canvas = document.getElementById('ecgCanvas');
        const ctx = canvas.getContext('2d');
        const hrDisplay = document.getElementById('hrDisplay');
        const rhythmLabel = document.getElementById('rhythmLabel');
        const rhythmTag = document.getElementById('rhythmTag');
        const alertMessage = document.getElementById('alertMessage');

        const stressSlider = document.getElementById('stressSlider');
        const stressPercent = document.getElementById('stressPercent');
        const pressureLevelDisplay = document.getElementById('pressureLevelDisplay');
        const hrvValue = document.getElementById('hrvValue');
        const intensityText = document.getElementById('intensityText');

        const resetBtn = document.getElementById('resetDefaultBtn');

        let currentHR = 72;
        let targetHR = 72;
        let arrhythmiaActive = false;
        let arrhythmiaType = 'none';

        const canvasWidth = 440;
        const canvasHeight = 150;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;

        let phase = 0;
        const baseY = canvasHeight/2 + 4;
        
        let noiseOffset1 = 0;
        let noiseOffset2 = 0;
        let noiseOffset3 = 0;
        let morphFactor = 0;

        function mapHeartRateToPhase(hr) {
            return (hr / 60) * 0.16;
        }

        function generateWaveY(x, phaseOffset, hr, arrType) {
            const t = (x * 0.16 + phaseOffset) % (Math.PI * 2.4);
            let y = baseY;
            
            const noise1 = Math.sin(x * 0.08 + noiseOffset1) * 1.8;
            const noise2 = Math.cos(x * 0.12 + noiseOffset2) * 1.2;
            const noise3 = Math.sin(x * 0.04 + noiseOffset3) * 2.0;
            
            const stressFactor = stressSlider.value / 100;
            const variability = 0.8 + stressFactor * 1.5;
            
            if (arrType === 'tachycardia') {
                const fastT = (x * 0.28 + phaseOffset * 2.2) % (Math.PI * 2);
                const qrs = 42 * Math.exp(-Math.pow((fastT - 0.9) % (2*Math.PI), 2) / 0.3);
                const tWave = 16 * Math.sin(fastT * 1.6) * Math.exp(-0.4 * fastT);
                y = baseY - 8 + qrs + tWave + noise1 * 1.5 + noise2;
                return Math.min(baseY + 42, Math.max(baseY - 38, y));
            }
            if (arrType === 'bradycardia') {
                const slowT = (x * 0.09 + phaseOffset * 0.7) % (Math.PI * 2.2);
                const qrs = 48 * Math.exp(-Math.pow((slowT - 1.2) % (2*Math.PI), 2) / 0.6);
                y = baseY + 6 + qrs + 10 * Math.sin(slowT * 0.9) + noise2 * 1.8;
                return Math.min(baseY + 35, Math.max(baseY - 28, y));
            }
            if (arrType === 'afib') {
                const fibT = (x * 0.21 + phaseOffset * 1.4) % (Math.PI * 2.4);
                const qrs = 36 * Math.exp(-Math.pow((fibT - 1.0) % (2*Math.PI), 2) / 0.45);
                const fibNoise = Math.sin(fibT * 7.0) * 5 + Math.cos(fibT * 11.0) * 3;
                y = baseY + fibNoise * variability + qrs + noise3 * 2.2;
                return Math.min(baseY + 40, Math.max(baseY - 35, y));
            }

            const normalT = (x * 0.16 + phaseOffset) % (Math.PI * 2.2);
            const pWave = 6 * Math.sin(normalT * 0.5) * Math.exp(-0.3 * normalT);
            const qrs = 48 * Math.exp(-Math.pow((normalT - 0.7) % (2*Math.PI), 2) / 0.25);
            const tWave = 18 * Math.sin(normalT * 1.4) * Math.exp(-0.5 * normalT);
            
            let nY = baseY - 2 + pWave + qrs + tWave + noise1 * 1.2 + noise2 * 0.8;
            
            if (stressFactor > 0.6) {
                nY += Math.sin(x * 0.05 + morphFactor) * 4 * stressFactor;
            }
            
            return Math.min(baseY + 36, Math.max(baseY - 30, nY));
        }

        function drawECG() {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            
            ctx.beginPath();
            ctx.strokeStyle = '#1a3f4a';
            ctx.lineWidth = 0.6;
            for (let i = 0; i < canvasWidth; i+=25) {
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvasHeight);
            }
            for (let j = 0; j < canvasHeight; j+=25) {
                ctx.moveTo(0, j);
                ctx.lineTo(canvasWidth, j);
            }
            ctx.stroke();

            const hr = Math.max(38, Math.min(178, currentHR));
            const step = mapHeartRateToPhase(hr);
            phase = (phase + step) % (Math.PI * 4);
            
            noiseOffset1 = (noiseOffset1 + 0.012) % (Math.PI * 2);
            noiseOffset2 = (noiseOffset2 + 0.008) % (Math.PI * 2);
            noiseOffset3 = (noiseOffset3 + 0.018) % (Math.PI * 2);
            morphFactor = (morphFactor + 0.005) % (Math.PI * 2);

            ctx.beginPath();
            let first = true;
            const arrState = arrhythmiaActive ? arrhythmiaType : 'none';
            
            for (let x = 0; x < canvasWidth; x+=1.2) {
                const yVal = generateWaveY(x, phase, hr, arrState);
                if (first) {
                    ctx.moveTo(x, yVal);
                    first = false;
                } else {
                    ctx.lineTo(x, yVal);
                }
            }

            ctx.lineWidth = 3.0;
            const stressVal = stressSlider.value;
            let waveColor = '#0ef7e0';
            if (arrhythmiaActive) {
                waveColor = '#ff8866';
            } else if (stressVal > 70) {
                waveColor = '#ffb347';
            }
            
            ctx.strokeStyle = waveColor;
            ctx.shadowColor = arrhythmiaActive ? '#ff3f1a' : (stressVal > 70 ? '#ffa040' : '#1effe0');
            ctx.shadowBlur = 16;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = arrhythmiaActive ? '#ffbcab' : '#a0faff';
            ctx.shadowBlur = 6;
            ctx.stroke();
            ctx.shadowBlur = 0;

            requestAnimationFrame(drawECG);
        }

        function refreshDisplay() {
            hrDisplay.textContent = Math.round(currentHR);
            
            let rhythmText = '竇性心律';
            let tagColor = '#2ad4c0';
            let alertContent = '心律正常 無異常';
            
            const stressVal = stressSlider.value;
            
            if (arrhythmiaActive) {
                if (arrhythmiaType === 'tachycardia') {
                    rhythmText = '心動過速';
                    tagColor = '#e67e22';
                    alertContent = '異常偵測 心搏過速';
                } else if (arrhythmiaType === 'bradycardia') {
                    rhythmText = '心動過緩';
                    tagColor = '#5dade2';
                    alertContent = '異常偵測 心搏過緩';
                } else if (arrhythmiaType === 'afib') {
                    rhythmText = '心房顫動';
                    tagColor = '#c44569';
                    alertContent = '異常偵測 心房顫動';
                } else {
                    rhythmText = '心律不整';
                    tagColor = '#e67e22';
                    alertContent = '偵測到心律異常';
                }
                rhythmLabel.textContent = rhythmText;
                rhythmTag.style.borderLeftColor = tagColor;
                rhythmTag.style.boxShadow = `0 0 15px ${tagColor}90`;
                alertMessage.textContent = alertContent;
            } else {
                rhythmLabel.textContent = '竇性心律';
                rhythmTag.style.borderLeftColor = '#2ad4c0';
                rhythmTag.style.boxShadow = '0 0 6px #00000070';
                alertMessage.textContent = stressVal > 70 ? '壓力偏高 注意休息' : '心律正常 無異常';
            }

            stressPercent.textContent = stressVal;
            let levelLabel = '';
            let hrvCalc = 64 - Math.floor(stressVal * 0.48);
            
            if (stressVal < 25) { 
                levelLabel = '輕度負荷'; 
                intensityText.textContent = '低'; 
            }
            else if (stressVal < 50) { 
                levelLabel = '中度負荷'; 
                intensityText.textContent = '中低'; 
            }
            else if (stressVal < 75) { 
                levelLabel = '高負荷'; 
                intensityText.textContent = '中高'; 
            }
            else { 
                levelLabel = '極限負荷'; 
                intensityText.textContent = '高'; 
            }
            
            pressureLevelDisplay.textContent = levelLabel;
            hrvValue.textContent = Math.max(12, hrvCalc + Math.floor(Math.random() * 5 - 2));
        }

        function applyStressToHeartRate() {
            const stress = parseInt(stressSlider.value, 10);
            let baseHR = 68 + Math.floor(stress * 0.46);
            
            if (arrhythmiaActive) {
                if (arrhythmiaType === 'tachycardia') baseHR = 128 + Math.floor(stress * 0.35);
                else if (arrhythmiaType === 'bradycardia') baseHR = 44 + Math.floor(stress * 0.12);
                else if (arrhythmiaType === 'afib') baseHR = 85 + Math.floor(stress * 0.42);
            }
            
            targetHR = Math.min(175, Math.max(38, baseHR));
        }

        function onStressSliderChange() {
            applyStressToHeartRate();
            refreshDisplay();
        }

        function resetToSinus() {
            arrhythmiaActive = false;
            arrhythmiaType = 'none';
            stressSlider.value = 22;
            applyStressToHeartRate();
            refreshDisplay();
        }

        stressSlider.addEventListener('input', onStressSliderChange);

        resetBtn.addEventListener('click', function() {
            resetToSinus();
        });

        window.addEventListener('load', function() {
            resetToSinus();
            requestAnimationFrame(drawECG);
        });

        setInterval(function() {
            if (!arrhythmiaActive) {
                const stress = parseInt(stressSlider.value, 10);
                let natural = 68 + Math.floor(stress * 0.44);
                targetHR = Math.min(150, Math.max(50, natural));
            }
            
            const randomFluctuation = (Math.random() - 0.5) * 8;
            const hrFluctuation = (Math.random() - 0.5) * 4;
            
            if (!arrhythmiaActive) {
                const stressVal = stressSlider.value;
                if (stressVal > 70) {
                    if (Math.random() < 0.002) {
                        arrhythmiaActive = true;
                        arrhythmiaType = 'tachycardia';
                    }
                } else if (stressVal < 15) {
                    if (Math.random() < 0.001) {
                        arrhythmiaActive = true;
                        arrhythmiaType = 'bradycardia';
                    }
                }
            } else {
                if (Math.random() < 0.01) {
                    arrhythmiaActive = false;
                    arrhythmiaType = 'none';
                }
            }
            
            if (arrhythmiaActive) {
                if (arrhythmiaType === 'tachycardia') {
                    targetHR = 125 + Math.floor(stressSlider.value * 0.3) + hrFluctuation;
                } else if (arrhythmiaType === 'bradycardia') {
                    targetHR = 45 + Math.floor(stressSlider.value * 0.1) + hrFluctuation * 0.5;
                } else if (arrhythmiaType === 'afib') {
                    targetHR = 80 + Math.floor(stressSlider.value * 0.4) + hrFluctuation * 1.5;
                }
                targetHR = Math.min(178, Math.max(38, targetHR));
            }
            
            currentHR = currentHR * 0.7 + targetHR * 0.3 + randomFluctuation * 0.3;
            currentHR = Math.min(178, Math.max(38, currentHR));
            
            hrDisplay.textContent = Math.round(currentHR);
            refreshDisplay();
        }, 600);
    })();
</script>
</body>
</html>
