<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>心炮彈 · 心律壓力模擬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans TC', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0f1a24, #050a0f);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .phone-frame {
            max-width: 480px;
            width: 100%;
            background: rgba(12, 22, 30, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.2px solid rgba(0, 210, 200, 0.25);
            border-radius: 52px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 210, 0.1) inset;
            padding: 24px 18px 28px;
            transition: all 0.2s;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 8px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .heart-beat-dot {
            width: 16px;
            height: 16px;
            background: #0ef7e0;
            border-radius: 50%;
            box-shadow: 0 0 18px #1affdd;
            animation: heartbeatPulse 1.3s infinite ease-in-out;
        }

        @keyframes heartbeatPulse {
            0%, 100% { opacity: 0.9; transform: scale(1); box-shadow: 0 0 10px #0ef7e0; }
            50% { opacity: 0.4; transform: scale(1.3); box-shadow: 0 0 22px #0ef7e0; }
        }

        h1 {
            font-weight: 550;
            font-size: 1.9rem;
            letter-spacing: 4px;
            color: #ecfdff;
            text-shadow: 0 3px 8px #00000060;
        }

        .device-tag {
            background: #173e4a;
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid #2ad4c0;
            color: #b2f0ea;
            font-weight: 500;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 10px #00808040;
        }

        .ecg-panel {
            background: #020b12;
            border-radius: 34px;
            padding: 14px 8px 6px;
            margin: 10px 0 16px;
            border: 1px solid #1f5b64;
            box-shadow: inset 0 5px 8px #00000080, 0 8px 12px #00000040;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: transparent;
            border-radius: 22px;
            touch-action: none;
        }

        .hr-monitor-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin: 6px 8px 10px;
        }

        .hr-left {
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .hr-label {
            color: #8fb1c4;
            font-weight: 400;
            font-size: 1.2rem;
        }

        .hr-number {
            font-size: 3.4rem;
            font-weight: 650;
            color: #f5ffff;
            line-height: 1;
            text-shadow: 0 0 16px #2ee6d0;
            letter-spacing: 2px;
        }

        .hr-unit {
            color: #6f9eb3;
            font-size: 1.2rem;
            margin-left: 4px;
        }

        .rhythm-badge {
            background: #0e2530;
            padding: 8px 22px;
            border-radius: 60px;
            border-left: 6px solid;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 10px #00000070;
        }

        .rhythm-name {
            font-size: 1.35rem;
            font-weight: 600;
            color: #def5ff;
        }

        .alert-bar {
            margin: 4px 8px 14px;
            min-height: 36px;
            font-size: 1.15rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #ffd1c2;
            text-shadow: 0 0 6px #ff5e3a;
        }

        .divider-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #1f7a80, #4edfdf, #1f7a80, transparent);
            margin: 14px 0 18px;
            opacity: 0.7;
        }

        .stress-training-card {
            background: #0e1b26d0;
            border-radius: 42px;
            padding: 18px 16px;
            backdrop-filter: blur(10px);
            border: 1px solid #2e8590;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .card-header span:first-child {
            color: #c5eaf5;
            font-weight: 550;
            font-size: 1.35rem;
        }

        .stress-level-badge {
            background: #153a46;
            border-radius: 40px;
            padding: 6px 18px;
            color: #b6f0fd;
            font-weight: 600;
            border: 1px solid #3fd0d0;
        }

        .slider-wrapper {
            margin: 10px 0 20px;
        }

        input[type=range] {
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #0e9c8a, #e0a93b, #d9534f);
            border-radius: 30px;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: #f0faff;
            border-radius: 30px;
            box-shadow: 0 0 22px #0fffd0, 0 2px 10px black;
            border: 2.5px solid #0fc5c5;
            cursor: grab;
        }

        .metric-grid {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            margin-top: 8px;
        }

        .metric-item {
            background: #03161f;
            border-radius: 30px;
            padding: 14px 4px;
            flex: 1;
            text-align: center;
            border: 1px solid #1f7a7a;
            box-shadow: inset 0 2px 6px #000000, 0 6px 8px #00000030;
        }

        .metric-title {
            color: #7eaec7;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 2.0rem;
            font-weight: 700;
            color: #e2fdff;
            text-shadow: 0 0 10px #1fb5d4;
        }

        .metric-unit {
            font-size: 0.9rem;
            color: #5f9db3;
            margin-left: 3px;
        }

        .button-group {
            display: flex;
            gap: 14px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            background: #143b4a;
            border: none;
            border-radius: 70px;
            padding: 16px 6px;
            font-size: 1.25rem;
            font-weight: 600;
            color: #e1f9ff;
            border-bottom: 4px solid #19a7a7;
            border-right: 1px solid #2dafc0;
            box-shadow: 0 7px 0 #08212b, 0 5px 12px black;
            cursor: pointer;
            transition: all 0.07s;
            text-align: center;
            backdrop-filter: blur(10px);
            letter-spacing: 2px;
            touch-action: manipulation;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #08212b, 0 4px 10px black;
            border-bottom-width: 2px;
        }

        .btn.reset-style {
            background: #173b47;
            border-bottom-color: #bd8b3a;
            border-right-color: #dbb267;
        }

        .footer-watermark {
            margin-top: 12px;
            text-align: right;
            color: #3c7b8f;
            font-size: 0.9rem;
            padding-right: 6px;
            font-weight: 400;
        }
    </style>
</head>
<body>
<div class="phone-frame">
    <div class="app-header">
        <div class="logo-area">
            <div class="heart-beat-dot"></div>
            <h1>心炮彈</h1>
        </div>
        <div class="device-tag">即時偵測</div>
    </div>

    <div class="ecg-panel">
        <canvas id="ecgCanvas" width="440" height="150"></canvas>
    </div>

    <div class="hr-monitor-row">
        <div class="hr-left">
            <span class="hr-label">心率</span>
            <span class="hr-number" id="hrDisplay">72</span>
            <span class="hr-unit">BPM</span>
        </div>
        <div class="rhythm-badge" id="rhythmTag">
            <span class="rhythm-name" id="rhythmLabel">竇性心律</span>
        </div>
    </div>

    <div class="alert-bar" id="alertBox">
        <span id="alertMessage">心律正常 無異常</span>
    </div>

    <div class="divider-line"></div>

    <div class="stress-training-card">
        <div class="card-header">
            <span>模擬心臟壓力訓練</span>
            <span class="stress-level-badge" id="pressureLevelDisplay">輕度負荷</span>
        </div>
        <div class="slider-wrapper">
            <input type="range" id="stressSlider" min="0" max="100" value="22" step="1">
        </div>
        <div class="metric-grid">
            <div class="metric-item">
                <div class="metric-title">負荷指數</div>
                <div class="metric-value"><span id="stressPercent">22</span><span class="metric-unit">%</span></div>
            </div>
            <div class="metric-item">
                <div class="metric-title">模擬 HRV</div>
                <div class="metric-value"><span id="hrvValue">48</span><span class="metric-unit">ms</span></div>
            </div>
            <div class="metric-item">
                <div class="metric-title">訓練強度</div>
                <div class="metric-value"><span id="intensityText">中低</span></div>
            </div>
        </div>
        <div class="button-group">
            <button class="btn" id="simulateArrhythmiaBtn">模擬異常</button>
            <button class="btn reset-style" id="resetDefaultBtn">重置</button>
        </div>
    </div>
    <div class="footer-watermark">心炮彈 · 壓力模擬器</div>
</div>

<script>
    (function(){
        "use strict";

        const canvas = document.getElementById('ecgCanvas');
        const ctx = canvas.getContext('2d');
        const hrDisplay = document.getElementById('hrDisplay');
        const rhythmLabel = document.getElementById('rhythmLabel');
        const rhythmTag = document.getElementById('rhythmTag');
        const alertMessage = document.getElementById('alertMessage');

        const stressSlider = document.getElementById('stressSlider');
        const stressPercent = document.getElementById('stressPercent');
        const pressureLevelDisplay = document.getElementById('pressureLevelDisplay');
        const hrvValue = document.getElementById('hrvValue');
        const intensityText = document.getElementById('intensityText');

        const simulateBtn = document.getElementById('simulateArrhythmiaBtn');
        const resetBtn = document.getElementById('resetDefaultBtn');

        let currentHR = 72;
        let arrhythmiaActive = false;
        let arrhythmiaType = 'none';

        const canvasWidth = 440;
        const canvasHeight = 150;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;

        let phase = 0;
        const baseY = canvasHeight/2 + 4;

        function mapHeartRateToPhase(hr) {
            return (hr / 60) * 0.18;
        }

        function generateWaveY(x, phaseOffset, hr, arrhythmia) {
            const t = (x * 0.18 + phaseOffset) % (Math.PI * 2);
            let y = baseY;

            if (arrhythmia === 'tachycardia') {
                const fastT = (x * 0.28 + phaseOffset * 2.0) % (Math.PI * 2);
                y = baseY - 10 + 12 * Math.sin(fastT * 1.4) + 40 * Math.exp(-Math.pow((fastT - Math.PI) % (2*Math.PI) - 0.6, 2) / 0.5) 
                    + 10 * Math.sin(fastT * 3.0) * Math.exp(-0.3 * fastT);
                return Math.min(baseY + 40, Math.max(baseY - 36, y));
            }
            if (arrhythmia === 'bradycardia') {
                const slowT = (x * 0.10 + phaseOffset * 0.6) % (Math.PI * 2);
                y = baseY + 8 + 12 * Math.sin(slowT * 0.7) + 44 * Math.exp(-Math.pow((slowT - 2.0) % (2*Math.PI), 2) / 1.0);
                return Math.min(baseY + 32, Math.max(baseY - 24, y));
            }
            if (arrhythmia === 'afib') {
                const fibT = (x * 0.23 + phaseOffset) % (Math.PI * 2);
                let irregular = Math.sin(fibT * 2.9) * 7 + Math.sin(fibT * 5.3) * 4;
                y = baseY + irregular + 38 * Math.exp(-Math.pow((fibT - 1.2) % (2*Math.PI), 2) / 0.7) 
                    + 12 * Math.sin(fibT * 3.5) * Math.exp(-0.2 * fibT);
                if (Math.random() > 0.7) y += 10;
                return Math.min(baseY + 38, Math.max(baseY - 32, y));
            }

            const normalT = (x * 0.18 + phaseOffset) % (Math.PI * 2);
            let nY = baseY - 4 + 46 * Math.exp(-Math.pow((normalT - 0.8) % (2*Math.PI), 2) / 0.35) 
                    + 18 * Math.sin(normalT * 1.8) * Math.exp(-0.7 * normalT)
                    + 6 * Math.sin(normalT * 4.2);
            return Math.min(baseY + 34, Math.max(baseY - 28, nY));
        }

        function drawECG() {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            
            ctx.beginPath();
            ctx.strokeStyle = '#1e4a55';
            ctx.lineWidth = 0.8;
            for (let i = 0; i < canvasWidth; i+=20) {
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvasHeight);
            }
            for (let j = 0; j < canvasHeight; j+=20) {
                ctx.moveTo(0, j);
                ctx.lineTo(canvasWidth, j);
            }
            ctx.stroke();

            const hr = currentHR;
            const step = mapHeartRateToPhase(hr);
            phase = (phase + step) % (Math.PI * 4);

            ctx.beginPath();
            let first = true;
            const arrState = arrhythmiaActive ? arrhythmiaType : 'none';
            
            for (let x = 0; x < canvasWidth; x+=1.5) {
                const yVal = generateWaveY(x, phase, hr, arrState);
                if (first) {
                    ctx.moveTo(x, yVal);
                    first = false;
                } else {
                    ctx.lineTo(x, yVal);
                }
            }

            ctx.lineWidth = 3.6;
            ctx.strokeStyle = arrhythmiaActive ? '#ff8866' : '#0ef7e0';
            ctx.shadowColor = arrhythmiaActive ? '#ff3f1a' : '#1effe0';
            ctx.shadowBlur = 18;
            ctx.stroke();
            ctx.shadowBlur = 0;

            ctx.beginPath();
            ctx.lineWidth = 1.8;
            ctx.strokeStyle = arrhythmiaActive ? '#ffbcab' : '#a0faff';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#00c0b0';
            ctx.stroke();
            ctx.shadowBlur = 0;

            requestAnimationFrame(drawECG);
        }

        function refreshDisplay() {
            hrDisplay.textContent = Math.round(currentHR);
            
            let rhythmText = '竇性心律';
            let tagColor = '#2ad4c0';
            let alertContent = '心律正常 無異常';
            
            if (arrhythmiaActive) {
                if (arrhythmiaType === 'tachycardia') {
                    rhythmText = '心動過速';
                    tagColor = '#e67e22';
                    alertContent = '異常偵測 心搏過速';
                } else if (arrhythmiaType === 'bradycardia') {
                    rhythmText = '心動過緩';
                    tagColor = '#5dade2';
                    alertContent = '異常偵測 心搏過緩';
                } else if (arrhythmiaType === 'afib') {
                    rhythmText = '心房顫動';
                    tagColor = '#c44569';
                    alertContent = '異常偵測 心房顫動';
                } else {
                    rhythmText = '心律不整';
                    tagColor = '#e67e22';
                    alertContent = '偵測到心律異常';
                }
                rhythmLabel.textContent = rhythmText;
                rhythmTag.style.borderLeftColor = tagColor;
                rhythmTag.style.boxShadow = `0 0 15px ${tagColor}90`;
                alertMessage.textContent = alertContent;
            } else {
                rhythmLabel.textContent = '竇性心律';
                rhythmTag.style.borderLeftColor = '#2ad4c0';
                rhythmTag.style.boxShadow = '0 0 6px #00000070';
                alertMessage.textContent = '心律正常 無異常';
            }

            const sliderVal = parseInt(stressSlider.value, 10);
            stressPercent.textContent = sliderVal;
            let levelLabel = '';
            let hrvCalc = 64 - Math.floor(sliderVal * 0.46);
            if (sliderVal < 25) { levelLabel = '輕度負荷'; intensityText.textContent = '低'; }
            else if (sliderVal < 50) { levelLabel = '中度負荷'; intensityText.textContent = '中低'; }
            else if (sliderVal < 75) { levelLabel = '高負荷'; intensityText.textContent = '中高'; }
            else { levelLabel = '極限負荷'; intensityText.textContent = '高'; }
            pressureLevelDisplay.textContent = levelLabel;
            hrvValue.textContent = Math.max(12, hrvCalc);
        }

        function applyStressToHeartRate() {
            const stress = parseInt(stressSlider.value, 10);
            let baseHR = 68 + Math.floor(stress * 0.44);
            if (arrhythmiaActive) {
                if (arrhythmiaType === 'tachycardia') baseHR = 130 + Math.floor(stress * 0.32);
                else if (arrhythmiaType === 'bradycardia') baseHR = 42 + Math.floor(stress * 0.10);
                else if (arrhythmiaType === 'afib') baseHR = 88 + Math.floor(stress * 0.40);
                else baseHR = 90;
            }
            currentHR = Math.min(178, Math.max(38, baseHR));
            refreshDisplay();
        }

        function onStressSliderChange() {
            applyStressToHeartRate();
        }

        function triggerArrhythmia(type) {
            arrhythmiaActive = true;
            arrhythmiaType = type;
            applyStressToHeartRate();
        }

        function resetToSinus() {
            arrhythmiaActive = false;
            arrhythmiaType = 'none';
            stressSlider.value = 22;
            applyStressToHeartRate();
        }

        stressSlider.addEventListener('input', onStressSliderChange);

        simulateBtn.addEventListener('click', function() {
            const types = ['tachycardia', 'bradycardia', 'afib'];
            const chosen = types[Math.floor(Math.random() * types.length)];
            triggerArrhythmia(chosen);
        });

        resetBtn.addEventListener('click', function() {
            resetToSinus();
        });

        window.addEventListener('load', function() {
            resetToSinus();
            requestAnimationFrame(drawECG);
        });

        setInterval(function() {
            if (!arrhythmiaActive) {
                const stress = parseInt(stressSlider.value, 10);
                let natural = 68 + Math.floor(stress * 0.40);
                currentHR = Math.min(145, Math.max(50, natural + (Math.random() * 7 - 3)));
            } else {
                applyStressToHeartRate();
            }
            hrDisplay.textContent = Math.round(currentHR);
            refreshDisplay();
        }, 750);
    })();
</script>
</body>
</html>
