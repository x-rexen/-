<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>心之炮彈</title>
</head>
<body style="margin:0;padding:0;min-height:100vh;background:radial-gradient(circle at 20% 30%, #0f1a24, #050a0f);display:flex;align-items:center;justify-content:center;padding:12px;font-family:'Segoe UI','Helvetica Neue','Noto Sans TC',system-ui,sans-serif;box-sizing:border-box;">
<div style="max-width:480px;width:100%;background:rgba(12,22,30,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.2px solid rgba(0,210,200,0.25);border-radius:52px;box-shadow:0 30px 50px rgba(0,0,0,0.8),0 0 0 1px rgba(0,255,210,0.1) inset;padding:24px 18px 28px;transition:all 0.2s;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:0 8px;">
        <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:16px;height:16px;background:#0ef7e0;border-radius:50%;box-shadow:0 0 18px #1affdd;animation:heartbeatPulse 1.3s infinite ease-in-out;"></div>
            <h1 style="margin:0;font-weight:550;font-size:1.9rem;letter-spacing:4px;color:#ecfdff;text-shadow:0 3px 8px #00000060;">心之炮彈</h1>
        </div>
        <div style="background:#173e4a;padding:6px 16px;border-radius:50px;border:1px solid #2ad4c0;color:#b2f0ea;font-weight:500;font-size:0.9rem;backdrop-filter:blur(4px);box-shadow:0 0 10px #00808040;">即時偵測</div>
    </div>
    <div style="background:#020b12;border-radius:34px;padding:14px 8px 6px;margin:10px 0 16px;border:1px solid #1f5b64;box-shadow:inset 0 5px 8px #00000080,0 8px 12px #00000040;">
        <canvas id="ecgCanvas" width="440" height="150" style="display:block;width:100%;height:auto;background:transparent;border-radius:22px;touch-action:none;"></canvas>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin:6px 8px 10px;">
        <div style="display:flex;align-items:baseline;gap:5px;">
            <span style="color:#8fb1c4;font-weight:400;font-size:1.2rem;">心率</span>
            <span id="hrDisplay" style="font-size:3.4rem;font-weight:650;color:#f5ffff;line-height:1;text-shadow:0 0 16px #2ee6d0;letter-spacing:2px;">72</span>
            <span style="color:#6f9eb3;font-size:1.2rem;margin-left:4px;">BPM</span>
        </div>
        <div id="rhythmTag" style="background:#0e2530;padding:8px 22px;border-radius:60px;border-left:6px solid #2ad4c0;transition:border-color 0.2s,box-shadow 0.2s;box-shadow:0 0 10px #00000070;">
            <span id="rhythmLabel" style="font-size:1.35rem;font-weight:600;color:#def5ff;">竇性心律</span>
        </div>
    </div>
    <div id="alertBox" style="margin:4px 8px 14px;min-height:36px;font-size:1.15rem;font-weight:500;display:flex;align-items:center;gap:6px;color:#ffd1c2;text-shadow:0 0 6px #ff5e3a;">
        <span id="alertMessage">心律正常 無異常</span>
    </div>
    <div style="height:2px;background:linear-gradient(90deg, transparent, #1f7a80, #4edfdf, #1f7a80, transparent);margin:14px 0 18px;opacity:0.7;"></div>
    
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 8px;">
        <div style="display:flex;align-items:center;gap:8px;">
            <span style="color:#c5eaf5;font-weight:550;font-size:1.35rem;">模擬心臟壓力訓練</span>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                <input type="checkbox" id="trainingToggle" checked style="width:20px;height:20px;accent-color:#0fc5c5;cursor:pointer;">
                <span style="color:#b2f0ea;font-size:1rem;">啟用</span>
            </label>
        </div>
    </div>
    
    <div id="trainingPanel">
        <div style="background:#0e1b26d0;border-radius:42px;padding:18px 16px;backdrop-filter:blur(10px);border:1px solid #2e8590;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
                <span style="color:#c5eaf5;font-weight:550;font-size:1.35rem;">壓力控制</span>
                <span id="pressureLevelDisplay" style="background:#153a46;border-radius:40px;padding:6px 18px;color:#b6f0fd;font-weight:600;border:1px solid #3fd0d0;">輕度負荷</span>
            </div>
            <div style="margin:10px 0 20px;">
                <input type="range" id="stressSlider" min="0" max="100" value="22" step="1" style="width:100%;height:8px;background:linear-gradient(90deg, #0e9c8a, #e0a93b, #d9534f);border-radius:30px;-webkit-appearance:none;appearance:none;">
            </div>
            <div style="display:flex;gap:12px;justify-content:space-between;margin-top:8px;">
                <div style="background:#03161f;border-radius:30px;padding:14px 4px;flex:1;text-align:center;border:1px solid #1f7a7a;box-shadow:inset 0 2px 6px #000000,0 6px 8px #00000030;">
                    <div style="color:#7eaec7;font-size:0.95rem;margin-bottom:8px;">負荷指數</div>
                    <div style="font-size:2.0rem;font-weight:700;color:#e2fdff;text-shadow:0 0 10px #1fb5d4;"><span id="stressPercent">22</span><span style="font-size:0.9rem;color:#5f9db3;margin-left:3px;">%</span></div>
                </div>
                <div style="background:#03161f;border-radius:30px;padding:14px 4px;flex:1;text-align:center;border:1px solid #1f7a7a;box-shadow:inset 0 2px 6px #000000,0 6px 8px #00000030;">
                    <div style="color:#7eaec7;font-size:0.95rem;margin-bottom:8px;">模擬 HRV</div>
                    <div style="font-size:2.0rem;font-weight:700;color:#e2fdff;text-shadow:0 0 10px #1fb5d4;"><span id="hrvValue">48</span><span style="font-size:0.9rem;color:#5f9db3;margin-left:3px;">ms</span></div>
                </div>
                <div style="background:#03161f;border-radius:30px;padding:14px 4px;flex:1;text-align:center;border:1px solid #1f7a7a;box-shadow:inset 0 2px 6px #000000,0 6px 8px #00000030;">
                    <div style="color:#7eaec7;font-size:0.95rem;margin-bottom:8px;">訓練強度</div>
                    <div style="font-size:2.0rem;font-weight:700;color:#e2fdff;text-shadow:0 0 10px #1fb5d4;"><span id="intensityText">中低</span></div>
                </div>
            </div>
            <div style="display:flex;gap:14px;margin-top:24px;">
                <button id="resetDefaultBtn" style="flex:1;background:#173b47;border:none;border-radius:70px;padding:16px 6px;font-size:1.25rem;font-weight:600;color:#e1f9ff;border-bottom:4px solid #bd8b3a;border-right:1px solid #dbb267;box-shadow:0 7px 0 #08212b,0 5px 12px black;cursor:pointer;transition:all 0.07s;text-align:center;backdrop-filter:blur(10px);letter-spacing:2px;touch-action:manipulation;">重置壓力</button>
            </div>
        </div>
    </div>
    <div style="margin-top:12px;text-align:right;color:#3c7b8f;font-size:0.9rem;padding-right:6px;font-weight:400;">心之炮彈 · 壓力模擬器</div>
</div>

<style>
    @keyframes heartbeatPulse {
        0%, 100% { opacity: 0.9; transform: scale(1); box-shadow: 0 0 10px #0ef7e0; }
        50% { opacity: 0.4; transform: scale(1.3); box-shadow: 0 0 22px #0ef7e0; }
    }
    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 30px;
        height: 30px;
        background: #f0faff;
        border-radius: 30px;
        box-shadow: 0 0 22px #0fffd0, 0 2px 10px black;
        border: 2.5px solid #0fc5c5;
        cursor: grab;
    }
    .btn:active {
        transform: translateY(5px);
        box-shadow: 0 2px 0 #08212b, 0 4px 10px black;
        border-bottom-width: 2px;
    }
    #trainingPanel {
        transition: opacity 0.25s;
    }
</style>

<script>
    (function(){
        "use strict";

        const canvas = document.getElementById('ecgCanvas');
        const ctx = canvas.getContext('2d');
        const hrDisplay = document.getElementById('hrDisplay');
        const rhythmLabel = document.getElementById('rhythmLabel');
        const rhythmTag = document.getElementById('rhythmTag');
        const alertMessage = document.getElementById('alertMessage');

        const stressSlider = document.getElementById('stressSlider');
        const stressPercent = document.getElementById('stressPercent');
        const pressureLevelDisplay = document.getElementById('pressureLevelDisplay');
        const hrvValue = document.getElementById('hrvValue');
        const intensityText = document.getElementById('intensityText');
        const resetBtn = document.getElementById('resetDefaultBtn');
        const trainingToggle = document.getElementById('trainingToggle');
        const trainingPanel = document.getElementById('trainingPanel');

        let currentHR = 72;
        let targetHR = 72;
        let arrhythmiaActive = false;
        let arrhythmiaType = 'none';
        let trainingEnabled = true;

        const canvasWidth = 440;
        const canvasHeight = 150;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;

        let phase = 0;
        const baseY = canvasHeight/2 + 4;
        let noiseOffset1 = 0, noiseOffset2 = 0, noiseOffset3 = 0, morphFactor = 0;
        let realRandomPhase = 0;

        function mapHeartRateToPhase(hr) {
            return (hr / 60) * 0.16;
        }

        function generateWaveY(x, phaseOffset, hr, arrType, trainingOn) {
            const t = (x * 0.16 + phaseOffset) % (Math.PI * 2.4);
            let y = baseY;
            const noise1 = Math.sin(x * 0.08 + noiseOffset1) * 1.8;
            const noise2 = Math.cos(x * 0.12 + noiseOffset2) * 1.2;
            const noise3 = Math.sin(x * 0.04 + noiseOffset3) * 2.0;
            const stressFactor = trainingOn ? stressSlider.value / 100 : 0.3 + Math.random() * 0.4;
            const variability = 0.8 + stressFactor * 1.5;
            
            if (!trainingOn) {
                const realT = (x * 0.18 + realRandomPhase) % (Math.PI * 2.2);
                const randomQRS = 40 + Math.random() * 20;
                const qrs = randomQRS * Math.exp(-Math.pow((realT - 0.8 + (Math.random()-0.5)*0.3) % (2*Math.PI), 2) / (0.2 + Math.random()*0.2));
                const tWave = (12 + Math.random()*12) * Math.sin(realT * (1.2 + Math.random()*0.8)) * Math.exp(-0.4 * realT);
                const extraNoise = Math.sin(x*0.03+noiseOffset1)*3 + Math.cos(x*0.07+noiseOffset2)*2.5;
                y = baseY - 4 + qrs + tWave + extraNoise + (Math.random()-0.5)*6;
                return Math.min(baseY + 38, Math.max(baseY - 32, y));
            }

            if (arrType === 'tachycardia') {
                const fastT = (x * 0.28 + phaseOffset * 2.2) % (Math.PI * 2);
                const qrs = 42 * Math.exp(-Math.pow((fastT - 0.9) % (2*Math.PI), 2) / 0.3);
                const tWave = 16 * Math.sin(fastT * 1.6) * Math.exp(-0.4 * fastT);
                y = baseY - 8 + qrs + tWave + noise1 * 1.5 + noise2;
                return Math.min(baseY + 42, Math.max(baseY - 38, y));
            }
            if (arrType === 'bradycardia') {
                const slowT = (x * 0.09 + phaseOffset * 0.7) % (Math.PI * 2.2);
                const qrs = 48 * Math.exp(-Math.pow((slowT - 1.2) % (2*Math.PI), 2) / 0.6);
                y = baseY + 6 + qrs + 10 * Math.sin(slowT * 0.9) + noise2 * 1.8;
                return Math.min(baseY + 35, Math.max(baseY - 28, y));
            }
            if (arrType === 'afib') {
                const fibT = (x * 0.21 + phaseOffset * 1.4) % (Math.PI * 2.4);
                const qrs = 36 * Math.exp(-Math.pow((fibT - 1.0) % (2*Math.PI), 2) / 0.45);
                const fibNoise = Math.sin(fibT * 7.0) * 5 + Math.cos(fibT * 11.0) * 3;
                y = baseY + fibNoise * variability + qrs + noise3 * 2.2;
                return Math.min(baseY + 40, Math.max(baseY - 35, y));
            }

            const normalT = (x * 0.16 + phaseOffset) % (Math.PI * 2.2);
            const pWave = 6 * Math.sin(normalT * 0.5) * Math.exp(-0.3 * normalT);
            const qrs = 48 * Math.exp(-Math.pow((normalT - 0.7) % (2*Math.PI), 2) / 0.25);
            const tWave = 18 * Math.sin(normalT * 1.4) * Math.exp(-0.5 * normalT);
            let nY = baseY - 2 + pWave + qrs + tWave + noise1 * 1.2 + noise2 * 0.8;
            if (stressFactor > 0.6) nY += Math.sin(x * 0.05 + morphFactor) * 4 * stressFactor;
            return Math.min(baseY + 36, Math.max(baseY - 30, nY));
        }

        function drawECG() {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            ctx.beginPath();
            ctx.strokeStyle = '#1a3f4a';
            ctx.lineWidth = 0.6;
            for (let i = 0; i < canvasWidth; i+=25) { ctx.moveTo(i, 0); ctx.lineTo(i, canvasHeight); }
            for (let j = 0; j < canvasHeight; j+=25) { ctx.moveTo(0, j); ctx.lineTo(canvasWidth, j); }
            ctx.stroke();

            const hr = Math.max(38, Math.min(178, currentHR));
            const step = trainingEnabled ? mapHeartRateToPhase(hr) : (hr / 60) * 0.19;
            phase = (phase + step) % (Math.PI * 4);
            realRandomPhase = (realRandomPhase + 0.025) % (Math.PI * 4);
            
            noiseOffset1 = (noiseOffset1 + 0.012) % (Math.PI * 2);
            noiseOffset2 = (noiseOffset2 + 0.008) % (Math.PI * 2);
            noiseOffset3 = (noiseOffset3 + 0.018) % (Math.PI * 2);
            morphFactor = (morphFactor + 0.005) % (Math.PI * 2);

            ctx.beginPath();
            let first = true;
            const arrState = (trainingEnabled && arrhythmiaActive) ? arrhythmiaType : 'none';
            for (let x = 0; x < canvasWidth; x+=1.2) {
                const yVal = generateWaveY(x, phase, hr, arrState, trainingEnabled);
                if (first) { ctx.moveTo(x, yVal); first = false; }
                else { ctx.lineTo(x, yVal); }
            }

            ctx.lineWidth = 3.0;
            const stressVal = trainingEnabled ? stressSlider.value : 40 + Math.random() * 30;
            let waveColor = '#0ef7e0';
            if (!trainingEnabled) waveColor = '#5fdbcf';
            else if (arrhythmiaActive) waveColor = '#ff8866';
            else if (stressVal > 70) waveColor = '#ffb347';
            
            ctx.strokeStyle = waveColor;
            ctx.shadowColor = !trainingEnabled ? '#2ecfbf' : (arrhythmiaActive ? '#ff3f1a' : (stressVal > 70 ? '#ffa040' : '#1effe0'));
            ctx.shadowBlur = 16;
            ctx.stroke();
            ctx.shadowBlur = 0;
            requestAnimationFrame(drawECG);
        }

        function refreshDisplay() {
            hrDisplay.textContent = Math.round(currentHR);
            let rhythmText = '竇性心律';
            let tagColor = '#2ad4c0';
            let alertContent = '心律正常 無異常';
            const stressVal = trainingEnabled ? stressSlider.value : 35 + Math.floor(Math.random() * 40);
            
            if (trainingEnabled) {
                if (arrhythmiaActive) {
                    if (arrhythmiaType === 'tachycardia') { rhythmText = '心動過速'; tagColor = '#e67e22'; alertContent = '異常偵測 心搏過速'; }
                    else if (arrhythmiaType === 'bradycardia') { rhythmText = '心動過緩'; tagColor = '#5dade2'; alertContent = '異常偵測 心搏過緩'; }
                    else if (arrhythmiaType === 'afib') { rhythmText = '心房顫動'; tagColor = '#c44569'; alertContent = '異常偵測 心房顫動'; }
                    else { rhythmText = '心律不整'; tagColor = '#e67e22'; alertContent = '偵測到心律異常'; }
                } else {
                    alertContent = stressVal > 70 ? '壓力偏高 注意休息' : '心律正常 無異常';
                }
                stressPercent.textContent = stressVal;
                let hrvCalc = 64 - Math.floor(stressVal * 0.48);
                hrvValue.textContent = Math.max(12, hrvCalc + Math.floor(Math.random() * 5 - 2));
                let levelLabel = stressVal < 25 ? '輕度負荷' : (stressVal < 50 ? '中度負荷' : (stressVal < 75 ? '高負荷' : '極限負荷'));
                pressureLevelDisplay.textContent = levelLabel;
                intensityText.textContent = stressVal < 25 ? '低' : (stressVal < 50 ? '中低' : (stressVal < 75 ? '中高' : '高'));
            } else {
                rhythmText = '竇性心律';
                alertContent = '真實隨機模擬';
                tagColor = '#3ccfaf';
                stressPercent.textContent = '--';
                hrvValue.textContent = Math.floor(35 + Math.random() * 40);
                pressureLevelDisplay.textContent = '自然波動';
                intensityText.textContent = '隨機';
                alertMessage.textContent = '真實模式 · 心律隨機變化';
            }
            
            rhythmLabel.textContent = rhythmText;
            rhythmTag.style.borderLeftColor = tagColor;
            rhythmTag.style.boxShadow = trainingEnabled && arrhythmiaActive ? `0 0 15px ${tagColor}90` : '0 0 6px #00000070';
            if (trainingEnabled) alertMessage.textContent = alertContent;
        }

        function updateHR() {
            if (!trainingEnabled) {
                targetHR = 58 + Math.floor(Math.random() * 55);
                currentHR = currentHR * 0.6 + targetHR * 0.4 + (Math.random() - 0.5) * 10;
                currentHR = Math.min(150, Math.max(45, currentHR));
                arrhythmiaActive = false;
            } else {
                const stress = parseInt(stressSlider.value, 10);
                let baseHR = 68 + Math.floor(stress * 0.46);
                if (arrhythmiaActive) {
                    if (arrhythmiaType === 'tachycardia') baseHR = 128 + Math.floor(stress * 0.35);
                    else if (arrhythmiaType === 'bradycardia') baseHR = 44 + Math.floor(stress * 0.12);
                    else if (arrhythmiaType === 'afib') baseHR = 85 + Math.floor(stress * 0.42);
                }
                targetHR = Math.min(175, Math.max(38, baseHR));
                const fluctuation = (Math.random() - 0.5) * 6;
                currentHR = currentHR * 0.7 + targetHR * 0.3 + fluctuation;
                
                if (!arrhythmiaActive) {
                    if (stress > 70 && Math.random() < 0.002) { arrhythmiaActive = true; arrhythmiaType = 'tachycardia'; }
                    else if (stress < 15 && Math.random() < 0.001) { arrhythmiaActive = true; arrhythmiaType = 'bradycardia'; }
                } else {
                    if (Math.random() < 0.01) { arrhythmiaActive = false; arrhythmiaType = 'none'; }
                }
            }
            currentHR = Math.min(178, Math.max(38, currentHR));
            hrDisplay.textContent = Math.round(currentHR);
            refreshDisplay();
        }

        function toggleTraining() {
            trainingEnabled = trainingToggle.checked;
            trainingPanel.style.display = trainingEnabled ? 'block' : 'none';
            arrhythmiaActive = false;
            arrhythmiaType = 'none';
            if (!trainingEnabled) currentHR = 68 + Math.random() * 20;
            refreshDisplay();
        }

        stressSlider.addEventListener('input', function() {
            if (trainingEnabled) refreshDisplay();
        });
        resetBtn.addEventListener('click', function() {
            if (trainingEnabled) {
                stressSlider.value = 22;
                arrhythmiaActive = false;
                arrhythmiaType = 'none';
                refreshDisplay();
            }
        });
        trainingToggle.addEventListener('change', toggleTraining);

        window.addEventListener('load', function() {
            toggleTraining();
            requestAnimationFrame(drawECG);
        });

        setInterval(updateHR, 650);
    })();
</script>
</body>
</html>
